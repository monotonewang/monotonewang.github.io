<!DOCTYPE html>
<html lang="en" manifest="demo.test">
<head>
    <meta charset="UTF-8">
    <title>三维选择</title>

    <style type="text/css">
        .box{
            width: 300px;
            height: 300px;
            background-color: yellow;
            margin: 50px auto 0;
            border: 1px solid black;
            /* 作用的属性 动画动作 延迟  */
            /* 先执行width动画，再执行高度动画  */
            transform:perspective(800px) rotateY(0deg);
            transition: all  200ms ease;
            
        }
        .box:hover{
               transform:perspective(800px)  rotateY(40deg);
        }

    </style>

</head>
<body>

    <div class="box">

    </div>
    
  
</body>
</html>

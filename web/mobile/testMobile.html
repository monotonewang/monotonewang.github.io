<!DOCTYPE html>
<html lang="en" manifest="demo.test">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cache</title>

    <style type="text/css">
        .box{
            width: 300px;
            height: 300px;
            margin-top: 500px;
            background-color: yellow;
            margin: 0 auto;
            border: 1px solid black;
            /* 作用的属性 动画动作 延迟  */
            /* 先执行width动画，再执行高度动画  */
            transition: width 500ms ease 200ms,height 500ms linear 700ms;
            
        }
        .box:hover{
                width: 600px;
                height: 200px;
        }

       
      
    </style>

</head>
<body>

    <div class="box">
        这是div的文字
    </div>
    
  

</body>
</html>

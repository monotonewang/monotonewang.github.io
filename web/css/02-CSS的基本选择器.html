<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Insert title here</title>

	<style type="text/css">

	/* 选择符的权重
	类型   0001
	class  0010
	id  0100
	属性 0010
	伪类 0010
	伪元素  0010
	包含选择符  取和
	内联样式 1000
	继承     0000 */
		/*
			* CSS的选择器
				* 告诉CSS的代码作用在哪个标签上。
					* 基本选择器
						* 标签名选择器		div{}	span{}
						* 类选择器：在HTML的标签上，提供了属性	class，定位到div的标签（美工经常使用的方式）
						 	<p class="my-class">
							* 写法：	.class的名称	(.hehe{CSS的代码})
							* 设置不同的标签，具有相同的样式

						* ID选择器
							<p id="my-id">
							* 在HTML的标签上，提供的属性 设置样式
								* 写法：	#id的名称	(#haha{CSS的代码})
							* 一般情况下：设置不同的ID
								* 一般情况下给js语言来使用。

						* 优先级：（特殊情况下）
							* 标签名选择器 < 类选择器 < ID选择器 < style属性

						  伪类选择器 a:hover

						  属性选择器 <img src="myimage.png">

					* 扩展选择器
						*

		div{
			color: red;
		}


		*/
		/* 群组选择器 */
		/* 这是通配符选择器 */
		*{
			margin: 0px;
			padding: 0px;
		}
		.hehe{
			font-size: 25px;
			color: fuchsia;
		}

		#haha{
			color: blue;
		}
		div{
			color: red;
		}
		#p1{
			color: blue;
		}
		.pp{
			color: red;
		}

	</style>

</head>
<body>

	<div>这是div的区域1</div>
	<div id="haha">这是div的区域2</div>
	<span class="hehe">这是span的区域1</span>
	<span id="haha2">这是span的区域2</span>
	<p class="hehe">这是p的区域1</p>
	<p class="pp" id="p1" >这是p的区域2</p>
	<!-- <p class="pp" id="p1" style="color:yellow">这是p的区域2</p> -->

</body>
</html>

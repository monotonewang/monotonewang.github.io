<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>white-space 默认是visible</title>

    <style type="text/css">
        .box {
            width: 100px;
            height: 100px;
            border: 1px solid gray;
            margin-left: 20px;
            margin-top: 20px;
        }

        .normal {
            overflow: hidden;
            text-overflow: clip;
        }
        /* 结合使用才有效果 */
        .e {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

    </style>

</head>

<body>

    <div class="box ">
        我是北京人，             哈哈哈哈 一起去石景山公园玩吧，
         然后去五环玩，然后去清华大学玩，之后来到了故宫
    </div>
    <div class="box normal">
        我是北京人，             哈哈哈哈 一起去石景山公园玩吧，
          然后去五环玩，然后去清华大学玩，之后来到了故宫
    </div>
    <div class="box e">
        我是北京人，             哈哈哈哈 一起去石景山公园玩吧，
          然后去五环玩，然后去清华大学玩，之后来到了故宫
    </div>



</body>

</html>

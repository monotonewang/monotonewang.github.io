<!--内联块元素 inline-block 可以将 a显示到 div里面 以一行显示-->
<!-- font-size: 0px; 去掉左右边距 -->
<!-- line-height: 48px; 可以垂直居中 -->

<style type="text/css">
    .list-item span{
        list-style-position: inside;
        display: list-item;
    }
    /* 行内块元素 效果和float:left很类似*/
    .inline-block div{
        /* margin-top: 20px; */
        display: inline-block;
        width: 100px;
        height: 100px;
        background-color: green;
    }
    /* 行内元素 宽和高失效 */
    .inline div{
        display: inline;
        width: 100px;
        height: 100px;
        background-color: green;
    }

    span{
        /* float: left; */
    }
    .company{
        display: block;
        width: 150px;

        background-color: wheat;

    }

        overflow: hidden;

    }
    .box a{

        font-family: 'Microsoft YaHei';

        line-height: 48px;

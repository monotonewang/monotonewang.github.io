<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <!-- 块元素 占一行 支持全部样式，如果没有设置宽度，默认为父级的100%，盒子占一行，即使设置了宽度 -->
    <div style="display: inline-block;background-color: aquamarine;" >
        <div>this is first div</div>
        <div>this is second div</div>
        <div>this is third div</div>
        <div>this is four div</div>
    </div>
    <br/>

    <!-- a span em b strong 都是内联元素 -->
    <div class="box">
        <a class='a_test'>简介</a>
        <a >新闻列表</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
        <a  >公司简介</a>
    </div>

</body>

<!--内联块元素 inline-block 可以将 a显示到 div里面 以一行显示-->
<!-- font-size: 0px; 去掉左右边距 -->
<!-- line-height: 48px; 可以垂直居中 -->

<style type="text/css">
    .box{
        margin-left: 10px;
        width: 694px;
        height: 50px;
        font-size: 0px;
        overflow: hidden;
        /* margin: 50px auto 0; */
        /* background-color: gold; */
    }
    .box a{
        font-style: oblique;
        font-family: 'Microsoft YaHei';
        text-decoration: none;
        line-height: 48px;
        margin-left: -1px;
        margin-bottom: -1px;
        text-align: center;
        /* background-color: gold; */
        width: 98px;
        font-size: 16px;
        color:pink;
        border: 1px solid green;
        height: 48px;
        display: inline-block;
        /* display: block; */
    }
    .box .a_test{
        margin-left: 0px;
    }
    /* 伪类选择器 */
    .box a:hover{
        background-color: chartreuse;
        color: blue;
    }
</style>

</html>

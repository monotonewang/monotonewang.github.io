<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>canvas</title>
</head>

<body>
<div>
    <canvas id="my_canvas" width="200" height="200"></canvas>
</div>
<canvas id="my_canvas1" width="200" height="200"></canvas>
<canvas id="my_canvas2" width="200" height="200"></canvas>
<canvas id="my_canvas4" width="200" height="200"></canvas>
<div>
    <canvas id="my_canvas5" width="200" height="200"></canvas>
</div>
</body>

<script type="text/javascript">

    window.onload = function () {
        drawRect();
        drawLine();
        drawCircle();
        drawGradient();
        drawImage();
    }

    function drawRect() {
        // alert("go")
        var c = document.getElementById("my_canvas");
        var cxt = c.getContext("2d");
        cxt.fillStyle = "#FF0000";
        cxt.fillRect(0, 0, 150, 75);

    }

    function drawLine() {
        var c = document.getElementById("my_canvas1");
        var cxt = c.getContext("2d");
        cxt.moveTo(10, 10);
        cxt.lineTo(150, 50);
        cxt.lineTo(10, 50);
        cxt.stroke();
    }

    function drawCircle() {
        var c = document.getElementById("my_canvas2")
        var cxt = c.getContext("2d")
        cxt.beginPath();
        cxt.arc(70, 18, 15, 0, Math.PI * 2, true)
        cxt.closePath();
        cxt.fill();
    }

    function drawGradient() {
        var c = document.getElementById("my_canvas4")
        var cxt = c.getContext("2d")
        var grd = cxt.createLinearGradient(0, 0, 175, 50);
        grd.addColorStop(0, "#FF0000")
        grd.addColorStop(1, "#00FF00")
        cxt.fillStyle = grd;
        cxt.fillRect(0, 0, 150, 75);
    }

    function drawImage() {
        var c = document.getElementById("my_canvas5")
        var cxt = c.getContext("2d")
        var img = new Image();
        img.src = "http://www.365mini.com/image/google_logo.png";
        // img.src="../imgs/gwc.png"
        // cxt.drawImage(img,0,0);

        img.onload = function () {
            //以Canvas画布上的坐标(10,10)为起始点，绘制图像
            //图像的宽度和高度分别缩放到350px和100px
            ctx.drawImage(img, 10, 10, 350, 100);
        };
    }

</script>
</html>

<!DOCTYPE html>
<html lang="en" manifest="demo.test">

<head>
    <meta charset="UTF-8">
    <title>h5_form</title>

    <script type="text/javascript" src="//cdn.bootcss.com/html5shiv/r29/html5.js"></script>

</head>

<body>

    <header>这是html5的header</header>

    <nav>这是页面的导航</nav>

    <section>这是页面的section</section>
    <article>这是文章的article</article>
    <aside>这是侧边栏的aside</aside>
    <footer>这是页面的footer</aside>
        <center>
            我是居中的html5
        </center>
        <br />
        <form>
            <label>网址：</label><input type="url" name="required"><br />
            <label>密码：</label><input type="password" name="required"><br />
            <label>邮箱：</label><input type="email" name="required"><br />
            <label>日期：</label><input type="date" name="required"><br />
            <label>时间：</label><input type="time" name="required"><br />
            <label>星期：</label><input type="week" name="required"><br />
            <label>月</label><input type="month" name="required"><br />
            <label>数量：</label><input type="number" name="required"><br />
            <label>范围：</label><input type="range" name="required"><br />
            <label>电话：</label><input type="tel" name="required"><br />
            <label>文本</label><input type="text" name="required"><br />
            <label>颜色：</label><input type="color" name="required"><br />
            <label>搜索：</label><input type="search" name="required"><br />
            <label>按钮:</label><input type="button" name="required" value="button"><br />
            <label>多选框:</label><input type="checkbox" name="required"><br />
            <label>单选框:</label><input type="radio" name="required"><br />
            <label>重置:</label><input type="reset" name="required"><br />

            <input type="submit" name="">

        </form>

</body>

</html>

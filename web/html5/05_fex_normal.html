<!DOCTYPE html>
<html lang="en" manifest="demo.test">

<head>
    <meta charset="UTF-8">
    <title>flex圣杯布局</title>
</head>

<style type="text/css">
    /* 关键代码 */
    html,body{
        width: 100%;
        height: 100%;
    }
    .main {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
    }
    .header{
        height: 100px;
        background: gray;
    }
    .center{
        display: flex;
        flex-direction: row;
        flex: 1;
    }
    .footer{
        height: 100px;
        background: gray;
    }
    .left{
        background: rebeccapurple;
    }
    .center{
        background: green;
    }
    .right{
        background: blue;
    }
</style>

<body>
    <div class="main">
        <div class="header">header</div>
        <div class="center">
            <div class="left">left</div>
            <div  class="center">center</div>
            <div  class="right">right</div>
        </div>
        <div class="footer">footer</div>
    </div>


</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>
        jquery 弹窗处理
    </title>
    <script type="text/javascript" src="js/jquery-3.4.1.min.js"></script>
    </script>


    <style type="text/css">
    .pop{
        position: fixed;
        width: 500px;
        height: 500px;
        left: 50%;
        margin-left: -250px;
        margin-top: -250px;
        top: 50%;
        background-color: #fff;
        border: 3px solid #000;
        z-index:9999;
    }
    .mask{
        position: fixed;
        width: 100%;
        height: 100%;
        background-color: #000;
        opacity: 0.3;
        filter:alpha(opacity=30);
        left: 0;
        top: 0;
        z-index:9990;
    }
    .pop_con{
        display: none;
    }
  
    </style>
    <script type="text/javascript">

        $(function () {
            var $btn=$(".button1");
            var $popCon=$(".pop_con");
            var $mask=$(".mask");
            console.log($btn.html());
            $btn.click(function(){
                $popCon.fadeIn();
                return false;

            });
            $mask.click(function(){
                $popCon.fadeOut();
            });
            // $(document).click(function(){
            //     $popCon.fadeOut();
            // });
        })

    </script>

</head>

<body>
    <button class="button1">
        弹出
    </button>

    <div class="pop_con">
        <div class="pop">
            弹框里面的文字
        </div>
        <div class="mask"></div>
    </div>
</body>

</html>

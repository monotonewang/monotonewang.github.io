            font-size: 40px;
            line-height: 60px;
            text-align: center;
            background-color: #000;
            position: fixed;
            right: 20px;
            bottom: 20px;
            border-radius: 50%;
            display: none;
        }
    </style>
    <script type="text/javascript">

        $(function () {

            var $div = $('.box');

            //窗口
            console.log("width=" + $(window).width());
            console.log("height=" + $(window).height());
            //文档
            console.log("width=" + $(document).width());
            console.log("height=" + $(document).height());

            // box +padding
            $menu = $('.menu');
            $menu_back = $('.menu_back');
            $to_top = $('.to_top');

            $(window).scroll(function () {
                var width=parseInt($(window).width()/2)-250;
                console.log("width="+width);

                var iNum=$(document).scrollTop();
                var iNum2=$(document).scrollLeft();
                if(iNum>200){
                    $menu.css({
                        'position':'fixed',
                        'top':'0',
                        'left':width+"px",
                        // 'left':'50%',
                        'marginLeft':'125'
                    })
                    $to_top.show();
                    $menu_back.show();
                }else{
                    $menu.css({
                        'position':'static',
                        'marginLeft':'auto'
                    })
                    $to_top.hide();
                    $menu_back.hide();
                }
            });
            //滑动到顶部
            $to_top.click(function(){
                $('html,body').animate({
                    scrollTop:0
                },200);
            });

        })

    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>简单的jQuery手风琴效果</title>
    <!-- <script src="http://www.jq22.com/jquery/jquery-1.10.2.js"></script> -->
    <script src="js/jquery-3.4.1.min.js"></script>
    <style type="text/css">
        ul li {
            list-style-type: none;
        }

        a {
            text-decoration: none;
        }

        img {
            border: none;
        }

        em,
        i {
            font-style: normal;
        }

        .xinxi_solution_bg {
            background-size: 100% 400px;
            max-width: 1920px;
            margin: 0 auto;
            background-color: #F7F7F7;
        }

        .xinxi_solution_main ul {
            overflow: hidden;
            height: 400px;
        }

        .xinxi_solution_main .main_mobile {
            max-width: 1080px;
            min-width: 1080px;
        }

        .xinxi_solution_main ul li {
            background: url('../images/pic1.png') no-repeat;
            height: 400px;
            float: left;
            width: 70px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s;
        }

        .xinxi_solution_main ul li:nth-child(2) {
            background: url('../images/pic2.png') no-repeat;
        }

        .xinxi_solution_main ul li:nth-child(3) {
            background: url('../images/pic3.png') no-repeat;
        }

        .xinxi_solution_main ul li:nth-child(4) {
            background: url('../images/pic4.png') no-repeat;
        }

        .xinxi_solution_main ul li:nth-child(5) {
            background: url('../images/pic5.png') no-repeat;
        }

        .xinxi_solution_main ul li:nth-child(6) {
            background: url('../images/pic6.png') no-repeat;
        }

        .xinxi_solution_main ul li .left_top {
            position: absolute;
            left: 0;
            width: 30px;
            padding: 0 20px;
            text-align: center;
        }

        .xinxi_solution_main ul li .left_top img {
            margin-left: 60px;
            width: 400px;
            height: 100%;
        }

        .xinxi_solution_main ul li i {
            font-size: 24px;
            color: #FFF;
        }

        .xinxi_solution_main .left_top {
            font-size: 30px;
            color: #FFF;
        }

        .xinxi_solution_main ul li .left {
            float: left;
            width: 70px;
            background: #000;
            opacity: 0.5;
            height: 400px;
        }

        .xinxi_solution_main ul li .right {
            float: left;
            width: 680px;
            position: relative;
            height: 400px;
        }

        .xinxi_solution_main .right dl {
            position: absolute;
            top: 50%;
            left: 30px;
        }

        .xinxi_solution_main .right dd {
            color: #FFF;
            font-size: 26px;
            border-radius: 5px;
            width: 280px;
            height: 75px;
            margin-bottom: 45px;
            background: #000;
            opacity: 0.5;
        }

        .xinxi_solution_main .right dl a {
            background-repeat: no-repeat;
            color: #FFF;
            font-size: 16px;
            line-height: 40px;
            height: 40px;
            width: 280px;
            text-align: center;
            padding: 0 10px;
            margin-bottom: 10px;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            -o-text-overflow: ellipsis;
            white-space: nowrap;
            background-size: 100% 100%;
            background-color: rgba(0, 0, 0, 0.23);
            border-radius: 5px;
            margin-top: 10px;
        }

        .xinxi_solution_main .right dl a.yichu {
            float: left;
            margin-right: 20px;
        }

        .xinxi_solution_main ul li.on {
            width: 780px;
        }

        .xinxi_solution_main ul li.two {
            background: url('images/pic2.png') no-repeat;
        }

        .xinxi_solution_main ul li.thr {
            background: url('images/pic3.png') no-repeat;
        }

        .xinxi_solution_main ul li.four {
            background: url('images/pic4.png') no-repeat;
        }

        .xinxi_solution_main ul li.five {
            background: url('images/pic5.png') no-repeat;
        }

        .xinxi_solution_main ul li.six {
            background: url('images/pic6.png') no-repeat;
        }
    </style>
</head>

<body>
    <div class="xinxi_solution_main">
        <div class="xinxi_solution_bg">
            <div class="main_mobile">
                <ul>
                    <li class="one on">
                        <div class="left"></div>
                        <div class="left_top">
                            <i>工业类</i><img src="https://timgsa.baidu.com/timg?image&quality=80&size=b9999_10000&sec=1558677530238&di=ab9bbe90e07296b599dc6650f955d0e9&imgtype=0&src=http%3A%2F%2Ffile.5fen.com%2Fuploads%2F120915%2F59-120915145KK49.jpg" alt="工业">
                        </div>
                        <div class="right">
                            <dl>
                                <a title="食品加工行业解决方案" target="_blank" href="#">
                                    食品加工行业解决方案</a>
                                <a title="汽车零部件行业解决方案" target="_blank" href="#">
                                    汽车零部件行业解决方案</a>
                                <a title="家具生产行业解决方案  " target="_blank" href="#">
                                    家具生产行业解决方案 </a>
                                <a title="智能生产制造解决方案" target="_blank" href="#">
                                    智能生产制造解决方案</a>
                                <a title="食品加工行业解决方案" target="_blank" href="#">
                                    食品加工行业解决方案</a>
                            </dl>
                        </div>
                    </li>
                    <li class="one">
                        <div class="left"></div>
                        <div class="left_top">
                            <i>商贸类</i><img src="https://timgsa.baidu.com/timg?image&quality=80&size=b9999_10000&sec=1558677530239&di=609d36e6939790ea0da0688a2eac6e1a&imgtype=0&src=http%3A%2F%2Fphoto.tp88.net%2Fupfile%2F20154%2F30%2F20154301129-7898740.jpg" alt="工业">
                        </div>
                        <div class="right">
                            <dl style="margin-top: -120px;">
                                <a title="手机通讯行业解决方案" target="_blank" href="#">
                                    手机通讯行业解决方案</a>
                                <a title="五金配件行业解决方案" target="_blank" href="#">
                                    五金配件行业解决方案</a>
                                <a title="家电卖场行业解决方案" target="_blank" href="#">
                                    家电卖场行业解决方案</a>
                            </dl>
                        </div>
                    </li>
                    <li class="one">
                        <div class="left"></div>
                        <div class="left_top">
                            <i>服务类</i><img src="https://timgsa.baidu.com/timg?image&quality=80&size=b9999_10000&sec=1558677530239&di=09f5febcce9cf6a9a73f2e7b4145dd85&imgtype=0&src=http%3A%2F%2Fimg2.ph.126.net%2FnGWlMzdtBv1Lw-c2gPuzkg%3D%3D%2F2687523077634215747.jpg" alt="工业">
                        </div>
                        <div class="right">
                            <dl>
                                <a title="餐饮行业解决方案" target="_blank" href="#">
                                    餐饮行业解决方案</a>
                                <a title="会员解决方案" target="_blank" href="#">
                                    会员解决方案</a>
                            </dl>
                        </div>
                    </li>
                    <li class="one">
                        <div class="left"></div>
                        <div class="left_top">
                            <i>售后服务</i><img src="https://ss3.bdstatic.com/70cFv8Sh_Q1YnxGkpoWK1HF6hhy/it/u=3493528392,3517331665&fm=26&gp=0.jpg" alt="工业">
                        </div>
                        <div class="right">
                            <dl>
                                <a title="软件服务支持" target="_blank" href="#">
                                    软件服务支持</a>
                            </dl>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
<script type="text/javascript">
    $(function () {
        $('.xinxi_solution_main ul li:eq(0)').addClass('on');
        $('.xinxi_solution_main ul li:eq(1)').addClass('b2');
        $('.xinxi_solution_main ul li:eq(2)').addClass('b3');
        $('.xinxi_solution_main ul li:eq(3)').addClass('b4');
        $('.xinxi_solution_main ul li:eq(4)').addClass('    ');
        $('.xinxi_solution_main ul li:eq(5)').addClass('b6');
        $('.xinxi_solution_main ul li:gt(3)').hide();
        //当三级分类大于7个的是，成两排显示
        $('.xinxi_solution_main ul li').each(function () {
            var len = $(this).find('.right dl a').length;
            if (len > 6) {
                $(this).find('.right dl a').addClass('yichu');
            }
        });

        //解决方案效果
        $('.xinxi_solution_main ul li').each(function () {
            var left_h = $(this).find('.left_top').height();
            $(this).find('.left_top').css({
                'top': '50%',
                'margin-top': -left_h / 2
            });

            var dl_h = $(this).find('.right dl').height();
            $(this).find('.right dl').css({
                'margin-top': -dl_h / 2
            });
        });
        $('.xinxi_solution_main ul li').click(function () {
            $(this).addClass('on').siblings().removeClass('on');
        });
        $('.xinxi_solution_main_mobile ul li:first-child').addClass('on');

        $('.xinxi_solution_main_mobile ul li').click(function () {
            $(this).addClass('on').siblings().removeClass('on');
        });

        $(".solu-category .solu-description").each(function () {
            var maxwidth = 60;
            if ($(this).text().length > maxwidth) {
                $(this).text($(this).text().substring(0, maxwidth));
                $(this).html($(this).html() + '...');
            }
        });

    });
</script>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>
        jquery 阻止事件向上冒泡
    </title>
    <script type="text/javascript" src="js/jquery-3.4.1.min.js"></script>
    </script>

    <style type="text/css">
        .grandfather {
            width: 300px;
            height: 300px;
            background-color: green;
            position: relative;
        }

        .father {
            width: 200px;
            height: 200px;
            background-color: gold;
        }

        .son {
            left: 0;
            top: 400;
            position: absoulte;
            width: 100px;
            height: 100px;
            background-color: red;
        }

        .div01 {
            width: 100px;
            height: 100px;
            background-color: green;
        }

        .div02 {
            width: 50px;
            height: 50px;
            background-color: red;
        }
    </style>
    <script type="text/javascript">

        $(function () {

            var $grandfather = $('.grandfather');
            var $father = $('.father');
            var $son = $('.son');

            //多个事件同时绑定
            $son.bind("click", function (event) {
                // $(this).event.stopImmediatePropagation();//error
                event.stopImmediatePropagation();//阻止事件上传
                console.log("son");
            });

            //son 会接受到事件 事件是按标签层级传递的
            $father.bind("click", function (event) {
                console.log("father");
            });

            $grandfather.bind("click", function (event) {
                console.log("grandfather");
            });

            var $input01 = $("#input01");
            $input01.focus(function () {//获取到焦点
                console.log('input01 focus');
            });

            $input01.blur(function () {//失去焦点 回调
                console.log('失去焦点');
            });

            // $input01.focus();
            var $div01 = $('.div01');
            var $div02 = $('.div02');
            $div01.mouseenter(function () {//子元素不触发该事件
                console.log('mouseenter 鼠标移入');
            });
            $div01.mouseleave(function () {//子元素不触发该事件
                console.log('mouseleave 鼠标移出');
            });
            $div02.mouseover(function () {//子元素也会触发该事件
                console.log(' mouseover 鼠标移入');
            });
            $div02.mouseout(function () {//子元素也会触发该事件
                console.log(' mouseout 鼠标移出');
            });
            $div02.hover(function(){
                console.log(' hover 鼠标 in');
            },function(){
                console.log(' hover 鼠标 out');
            })

            var $sub=$('#sub');

            $('.button1').click(function(){
                $sub.submit();//可以触发下面的submit事件
            });
            $sub.submit(function(event){
                console.log('sub submit event');
                
                event.stopImmediatePropagation();//阻止冒泡
                event.preventDefault();//阻止表单提交行为
                //合并写法
                return false;
            });
            //window的size发生变化
            $(window).resize(function(){
                var $w=$(window).width();
                console.log(' $w='+$w);
            });
        })

    </script>

</head>

<body>
    <button class="button1">
        按钮1
    </button>
    <div class='grandfather'>
        <div class='father'>
            <div class='son'>

            </div>
        </div>
    </div>

    <!-- css 的 autofocus 无效 原因未知 -->
    <input type="text" id="input01" autofocus>
    <input type="text" id="input02">
    <input type="submit" value="提交" name="" id='sub'>

    <div class="div01">
        <div class="div02">

        </div>
    </div>
</body>

</html>

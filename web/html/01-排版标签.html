<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<title>Insert title here</title>
</head>

<body>

	<!-- HTML的注释（只支持一次） -->

	<!--
		排版标签
			* <br />	换行
			* <hr />	一条水平线
				* color:	颜色
					* 值的写法：两种
						1）直接写英文的单词（red green blue）
						2）RGB三原色(red green blue)	#ab1255
				* width：	宽度
					* 值两种写法：      1）	200px;
								2）	可以写百分比
								区别：百分比跟着浏览器的大小而改变，像素值不会。

			* <p></p>	段落标签
				* 段落标签的开始和结束位置留一空行。
				* align：对齐方式

			* &nbsp;	代表空格


			* 在浏览器声明一块区域，区域中放入其他（文字，子标签）
			* <div></div>		+CSS+DIV在网页进行布局（美工）
			* <span></span>
				* div块级元素（换行的符号）
				* span标签不会换行	行内元素

				<i> 被用来传达传统上用斜体表达的意义：外国文字，分类名称，技术术语，一种思想……
				<b> 被用来传达传统上用粗体表达的意义：关键字，产品名称，引导句……
				<u> 被用来传达传统上用下划线表达的意义：专有名词，拼写错误…
	 -->

	我是&nbsp;&nbsp;&nbsp;&nbsp; 题目

	<hr color="#ab1255" width="200px" />

	静夜思
	床前明月光，<br />
	<p align="center">
		<!-- i和em没有什么区别  u 和 i同时使用-->
		<u><i>疑是地上霜。</i></u><br />
		<em>疑是地上霜。</em><br />
		<b>举头望明月，</b><br />
	</p>
	<u>低头思故乡。</u><br />
	<i>锄禾日当午</i>

	<!-- 空标记-用来做水平线 -->
	<hr />


	<div>
		图片
	</div>
	<div>
		新闻
	</div>


	<!-- 通过(scripts)程序动态添加内容的话，显示出来 -->
	<span></span>

	<!-- 块引用 -->
	<blockquote cite="https://developer.mozilla.org/en-US/docs/Web/HTML/Element/blockquote">
		<p>The <strong>HTML <code>&lt;blockquote&gt;</code> Element</strong> (or <em>HTML Block
				Quotation Element</em>) indicates that the enclosed text is an extended quotation.</p>
	</blockquote>
</body>

</html>

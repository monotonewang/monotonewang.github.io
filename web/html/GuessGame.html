<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Guess Game</title>
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            font-size: 48px;
        }
    </style>
    <style type="text/css">
        html {
            background-color: #00539F;
        }

        body {
            width: 1200px;
            margin: 0 auto;
            background-color: #FF9500;
            padding: 0 20px 20px 20px;
            border: 5px solid black;
        }

        h1 {
            text-align: center;
            margin: 0 auto;
            text-shadow: 3px 3px 1px black;
        }

        img {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

<form>
    Enter Game number(0-100):<input id="number" type="number" onkeyup="this.value=this.value.replace(/[^\d]/g,'') "
                             onafterpaste="this.value=this.value.replace(/[^\d]/g,'') " name="f_order" />
</form>
<button id="generate">Generate random number</button>
<button id="noGuess">老子不想猜了，直接告诉我答案吧</button>

<p id="content"></p>
<p id="trueValue"></p>


</body>
<script src="../scripts/GuessGame.js"></script>
</html>

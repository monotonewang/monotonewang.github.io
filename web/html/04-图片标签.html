<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<title>Insert title here</title>
</head>

<body>
	<!-- 
		* 图片标签
			<img />
			* 属性：
				* src="图片的地址"
				* width="图片的显示宽度"
				* height:图片显示的高度
				* alt：图片的说明文字
				
	-->

	<!-- 也可以使用绝对路径  -->
	<!-- 同级目录   ./imgs/girl4.jpg -->

	<img src="../imgs/girl4.jpg" width="60%" height="70%" alt="啊，美女啊！" title="w">

	<hr />

	<marquee>
		<img alt="" src="../imgs/funny3.gif">
	</marquee>
	<!-- 图片默认是左右排布的 -->
	设置width或者height会等比例缩放
	<div>
		<img src="../imgs/apple.jpeg" width="100px">
		<img src="../imgs/arrow.jpeg" width="100px">
		<img src="../imgs/girl4.jpg" width="100px">
	</div>

</body>

</html>

<!DOCTYPE html>
<html>

<head>
  <title>banner loop</title>
  <div id="box">
    <img class="loop" id="js_img" src="../../imgs/girl.jpg" />
    <!-- <img class="loop" src="../../imgs/girl4.jpg"/>
    <img class="loop" src="../../imgs/gwc.png"/>
    <img class="loop" src="../../imgs/apple.jpeg"/>
    <img class="loop" src="../../imgs/arrow.jpeg"/> -->
    <ul class="my_ul" id="js_ul">
      <li>1</li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
      <li>5</li>
    </ul>
  </div>
</head>
<style type="text/css">
  body {
    margin: 0;
  }

  #box {
    background-color: rgb(0, 0, 0,0.1);
    margin: 50px auto 0px;
    width: 500px;
    height: 340px;
  }

  .loop {
    width: 500px;
    height: 300px;
  }

  .my_ul {
    justify-content: center;
    padding: 0px;
    margin: 5px auto;
    display: flex;
    list-style: none;
  }

  li {
    overflow: hidden;
    border-radius: 50%;
    text-align: center;
    width: 20px;
    height: 20px;
    background-color: rgb(0, 0, 0, 0.2);
    margin-left: 5px;
  }

  #ball {
    width: 30px;
    height: 30px;
    background-color: aqua;
    border-radius: 15px;
    position: absolute;
  }
</style>
<script type="text/javascript">
  var ball = document.getElementById("ball");
  var jsImg = document.getElementById("js_img");
  var jsLi = document.getElementsByTagName("li");

  let currentPage = 1;
  let timer = null;
  jsLi[0].style.backgroundColor = "red";
  startLoop();
  function changePage() {
    currentPage++;
      if (currentPage == 6) {
        currentPage = 1;
      }
      for (let i = 0; i < jsLi.length; i++) {
        jsLi[i].style.backgroundColor = "rgb(0, 0, 0, 0.2)";
      }
      jsLi[currentPage - 1].style.backgroundColor = "red";
      switch (currentPage) {
        case 1:
          jsImg.src = "../../imgs/girl.jpg";
          break
        case 2:
          jsImg.src = "../../imgs/girl4.jpg";
          break
        case 3:
          jsImg.src = "../../imgs/gwc.png";
          break
        case 4:
          jsImg.src = "../../imgs/apple.jpeg";
          break
        case 5:
          jsImg.src = "../../imgs/arrow.jpeg";
          break
      }
  }
  function startLoop() {
    timer = setInterval(function () {
      changePage();
    }, 1000);
  }

  window.onload = function (e) {
    jsImg.addEventListener("mouseenter", function (e) {
      clearInterval(timer);
    }, false);
    jsImg.addEventListener("mouseout", function (e) {
      startLoop();
    }, false);
    for(let i=0;i<jsLi.length;i++){
      jsLi[i].addEventListener("mouseenter", function (e) {
        // console.log(jsLi[i].innerHtml);
        clearInterval(timer);
        currentPage=i;
        changePage();
      },false);
      jsLi[i].addEventListener("mouseout", function (e) {
        startLoop();
      },false);
    }

  }

</script>

<body>

</body>

</html>

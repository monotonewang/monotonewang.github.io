<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<title>Insert title here</title>
</head>

<body>

	<div id="div1">div1</div>
	<ul id="myList">
		<li>Coffee</li>
		<li>Tea</li>
	</ul>
</body>
<script type="text/javascript">

	/* 
		* js的方法
			* java中	public String 方法名称(参数列表(int num,String str)){
							方法体;
							return null;
						}		
			* js中，通过关键字function	声明方法。
				function 方法名称(参数列表 (num,str)){
					方法体;
					return;
				}
				* 参数列表：不能使用var关键字
				* 返回值：可写可不写的，如果有写返回值，如果没有，返回值可以省略不写。
			* 调用执行。	
			* 在函数的内部，有一个数组，装传过来的参数的
				arguments		
	*/
	// 定义函数

	function add() {
		alert("哈哈");
		return;
	}

	//行间函数
	document.getElementById('div1').onclick = add;
	//匿名函数
	document.getElementById('div1').onclick = function add() {
		alert("哈哈s");
		return;
	}
	// add();

	function add2(num1, num2) {
		alert(arguments.length);
		var sum;
		sum = num1 + num2;
		return sum;
	}

	// var result = add2(10,5);
	// alert(result);

	// var result2 = add2(10,10,7,8);
	// alert(result2);


	function getSum() {
		return 100;
	}

	var sum = getSum;
	//alert(sum);

	var sum2 = sum();
	alert(sum2);

	/* 
		* js的动态函数和匿名函数
			* 动态函数
				function getSum(){
					return 50;
				}
				js提供了内置对象	Function
				
			* 匿名函数
				* 没有名称的函数
	*/

	var param1 = "x,y";
	var param2 = "var sum;sum=x+y;return sum;";
	var param3 = "var sum;sum=x*y;return sum;";

	var add = new Function(param1, param3);
	var sum = add(4, 5);
	// alert(sum);

	function add2(x, y) {
		var sum;
		sum = x * y;
		return sum;
	}
	// add2(5,6);


	var getSum = function () {
		return 100;
	};
	// alert(getSum());
	(function () {
		var node = document.createElement("LI");
		var textnode = document.createTextNode("Water");
		node.appendChild(textnode);
		document.getElementById("myList").appendChild(node);

	})();

	//容易导致stack 溢出
	function get100(n) {
		if(n==1){
			return 1;
		}else{
			return get100(n-1)+n;
		}
	}
	console.log("get100()");
	console.log(get100(10));
</script>

</html>

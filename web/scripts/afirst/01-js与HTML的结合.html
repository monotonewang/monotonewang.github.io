<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<title>Insert title here</title>

</head>

<body>

	<!--
		* js和HTML的结合
			* HTML的文件提供了一个标签	<scripts type="text/javascript">js的代码</scripts>，标签可以放在HTML文件的任意位置上。

			* 引入外部的文件，有一个外部的文件。编写js文件。
				* <scripts src="引入js文件（相对路径）" >
				* 如果script通过src的属性引入了外部的文件，里面的js代码就不会执行了。（*****）

			* </scripts>，标签可以放在HTML文件的任意位置上。

	-->

	<!-- <scripts type="text/javascript" src="demo.scripts"></scripts> -->

	<span id="spanId" onclick="clickspanId();">这是span的区域</span>

	<!-- 这是行间规则 -->
	<div onclick="alert('hello')">this is a div</div>

	<a href="#" id="link">link</a>

</body>

<!-- 推荐放在这个位置 -->
<script type="text/javascript">
	// window.alert("hehe");

	document.write("&lt;spanId&gt;");

	//改变元素属性
	var sId = document.getElementById('spanId');
	sId.style.color = "red";
	sId.style.footSize = "15px";

	var mStyle='color';
	var mColor='green';
	//也可以通过括号加入变量的方式修改属性
	sId.style[mStyle]=mColor;

	// 编写js代码，操作span的标签，获取中间的文本内容，弹出。
	function clickspanId() {
		alert(document.getElementById("spanId").innerHTML);
		// document.write("&lt;spanId&gt;&lt;");
	}

	var oA=document.getElementById("link");
	oA.addEventListener('click',showMsg,false);

	oA.title="百度";//鼠标放置的时候显示

	function showMsg(){
		oA.href="http://www.baidu.com";
		var status="0"
		console.log()
	}


	document.getElementById('bodys').style.color='red';


</script>

</html>

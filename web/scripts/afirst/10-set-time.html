<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>set_time</title>
    <script type="text/javascript">

        window.onload = function () {

            var oDiv = document.getElementById('div1');
            var fSet = setInterval(setLeft, 30);
            // var fSet=window.setInterval(function(){


            // },300);

            var iLeft = 0;
            var iMax = 700;
            var iSpeed = 3;

            var bDirection = true;

            function setLeft() {

                // document.write("<br/>"+iLeft);

                // document.getElementById('div1').style.left=iLeft+'px';
                oDiv.style.left = iLeft + 'px';

                // document.getElementById('div1').style.marginLeft=iLeft+'px';

                //来回摆动
                if (!bDirection) {
                    iLeft = iLeft - iSpeed;
                    if (iLeft <= 0) {
                        bDirection = true;
                    }
                    // clearInterval(fSet);
                } else {
                    iLeft = iLeft + iSpeed;
                    if (iLeft > iMax) {
                        bDirection = false;
                    }
                }
            }
        }


    </script>
    <style type="text/css">
        #div1 {
            left: 0;
            background-color: green;
            width: 50px;
            height: 50px;
            position: absolute;
            /* margin-left: 140px; */
        }
    </style>
</head>

<body>
    <div id="div1">
        这是一个盒子
    </div>
</body>

</html>

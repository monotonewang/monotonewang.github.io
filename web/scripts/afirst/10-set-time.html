<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>set_time</title>
    <script type="text/javascript">

        window.onload = function () {

            let a=[1,2,3]
            let b=a.splice(1, 1);
            console.log(a);
            console.log(b);
            var promise = new Promise(function(resolve, reject){
                    // ... some code
                    let value=2;
                    let error=3;
                    if (1==2) {
                        resolve(value);
                    } else {
                        reject(error);
                    }
                }).then(value=>{
                    console.log("promise then" );
                    console.log(value);
                });
                console.log("promise");
                console.log(promise);

               for(var i = 0; i < 3; i++)
                {
                    (function(i){
                        setTimeout(function(){
                        console.log(i);
                        }, 1000);
                    })(i);
                }
                
            var oDiv = document.getElementById('div1');
            var fSet = setInterval(setLeft, 30);
            // var fSet=window.setInterval(function(){


            // },300);

            var iLeft = 0;
            var iMax = 700;
            var iSpeed = 3;

            var bDirection = true;

            function setLeft() {

                // document.write("<br/>"+iLeft);

                // document.getElementById('div1').style.left=iLeft+'px';
                oDiv.style.left = iLeft + 'px';

                // document.getElementById('div1').style.marginLeft=iLeft+'px';

                //来回摆动
                if (!bDirection) {
                    iLeft = iLeft - iSpeed;
                    if (iLeft <= 0) {
                        bDirection = true;
                    }
                    // clearInterval(fSet);
                } else {
                    iLeft = iLeft + iSpeed;
                    if (iLeft > iMax) {
                        bDirection = false;
                    }
                }
            }
        }


    </script>
    <style type="text/css">
        #div1 {
            left: 0;
            background-color: green;
            width: 50px;
            height: 50px;
            position: absolute;
            /* margin-left: 140px; */
        }
    </style>
</head>

<body>
    <div id="div1">
        这是一个盒子
    </div>
</body>

</html>

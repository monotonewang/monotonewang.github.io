	console.log("二维数组");

	var myArrBubble = [11, 12, 32, 1, 5, 7];
	for (var i = 0; i < myArrBubble.length; i++) {
		for (var j = 0; j < myArrBubble.length - i - 1; j++) {
			if (myArrBubble[j] > myArrBubble[j + 1]) {
				var tmp = myArrBubble[j + 1];
				myArrBubble[j + 1] = myArrBubble[j];
				myArrBubble[j] = tmp;
			}
		}
	}
	console.log(myArrBubble);
	console.log("选择排序");

		for (var j = i + 1; j < myArrChoose.length; j++) {

	})
	var mapArr = [10, 20, 30];
	// 会返回一个新的数组
	var mapArrAfter = mapArr.map(function (pre, next, index, array) {
		console.log("map pre=" + pre + "next=" + next + "index=" + index + "array=" + array);
		return pre + next;
	})
	console.log(mapArrAfter);

	// some 是否有一个元素 return是一个boolean值
	var someArrAfter = mapArr.some(function (item, index, array) {
		console.log("some item=" + item + "index=" + index + "array=" + array);
		if (item == 30) {
			return true;
		}
	})
	console.log(someArrAfter);
	// every 检查每一个元素 return是一个boolean值
	var everyArrAfter = mapArr.some(function (item, index, array) {
		console.log("every item=" + item + "index=" + index + "array=" + array);
		if (item >= 30) {
			return true;
		}
	})

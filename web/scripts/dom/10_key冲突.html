<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	<title>KeyUp</title>
	<style type="text/css">
    .inner{
      /* position: absolute; */
      width: 100px;
      height: 100px;
      background-color: blue;
    }
    .outer{
      /* position: absolute; */
      width: 200px;
      height: 200px;
      background-color: red;
    }
	</style>
</head>

<body>
<div class="outer">
  <div class="inner"></div>

</div>

</body>
<script type="text/javascript">

window.onload=function(){
  let oDivOutter=document.getElementsByClassName("outer")[0];
  let oDivInner=document.getElementsByClassName("inner")[0];

  oDivOutter.onclick=function(){
    console.log("oDivOutter");
  }
  oDivInner.onclick=function(e){
    console.log("oDivInner");
    //阻止事件冒泡
    let evt=e || event;
    evt.cancelBubble=true;
    evt.stopPropagation();
  }

}


</script>

</html>

<html>

<head>
    <!-- 这是开发环境 -->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <!-- 这是生产环境 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue"></script> -->

</head>

<body>

    <div id="app">
        <p>页面载入时，input 元素自动获取焦点：</p>
        <input v-focus>
    </div>
    <script type="text/javascript">

        // 注册一个全局自定义指令 v-focus
        Vue.directive('focus', {
            // 当绑定元素插入到 DOM 中。
            inserted: function (el) {
                // 聚焦元素
                el.focus()
            }
        })
        // 创建根实例
        new Vue({
            el: '#app'
        })
    </script>
</body>

</html>

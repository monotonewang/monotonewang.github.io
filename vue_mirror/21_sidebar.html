<html>

<head>
    <!-- 这是开发环境 -->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <!-- 这是生产环境 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue"></script> -->
    <script src="https://unpkg.com/vue-router/dist/vue-router.js"></script>
    <title>21命名空间</title>
</head>
<style>
    .us {
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-rows: auto;
    grid-template-areas: 
        "header header"
        "nav content"
        "nav helper"
        ;
    }

    h2 {
    grid-area: header;
    }

    .us__nav {
    grid-area: nav;
    border: 1px dotted;
    margin-right: .75rem;
    padding: .3rem;
    }
    .us__content {
    grid-area: content;
    }
    .us__content--helper {
    grid-area: helper;
    }
</style>

<body>
    <div id="app">
        <h1>Nested Named Views</h1>
        <router-view></router-view>
    </div>

    <script type="text/javascript">
        const UserSettingsNav = {
            template: `
                <div class="us__nav">
                    <router-link to="/settings/emails">emails</router-link>
                    <br>
                    <router-link to="/settings/profiles">profile</router-link>
                </div>
                `
        }
        // 命名视图 router-view  指定name
        const UserSettings = {
            template: `
                <div class="us">
                    <h2>User Settings</h2>
                    <UserSettingsNav/>
                    <router-view class ="us__content"/>
                    <router-view name="helper" class="us__content us__content--helper"/>
                </div>
                 `,
            components: { UserSettingsNav }
        }

        const UserEmailsSubscriptions = {
            template: `
                <div>
                    <h3>Email Subscriptions</h3>
                </div>
                `
        }
        const UserProfile = {
            template: `
            <div>
                <h3>Edit your profile</h3>
            </div>
            `
        }

        const UserProfilePreview = {
            template: `
                <div>
                    <h3>Preview of your profile</h3>
                </div>
                `
        }

        const routerObj = new VueRouter({
            // mode: 'history',
            routes: [
                {   path: '/settings',
                    component: UserSettings,
                    children: [
                        { path: 'emails', component: UserEmailsSubscriptions },
                        // { path: 'profiles', component: UserProfile },
                        { path: 'profiles', components: {
                                default: UserProfile,
                                'helper': UserProfilePreview
                            }
                        },

                    ]
                }
            ]
        })

        // routerObj.push('/settings/emails')

        // 4. 创建和挂载根实例。
        // 记得要通过 router 配置参数注入路由，
        // 从而让整个应用都有路由功能
        const app = new Vue({
            el: '#app',
            router: routerObj,//注册到vm实例上
            data: {

            },
        })
    </script>
</body>

</html>

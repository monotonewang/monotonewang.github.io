<html>

<head>
    <!-- 这是开发环境 -->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <!-- 这是生产环境 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue"></script> -->
    <script src="https://unpkg.com/vue-router/dist/vue-router.js"></script>
</head>
<style>
    /* 选中的特殊样式 */
    /* .router-link-active {
        color: red;
    } */

    .myclass {
        color: black;
    }

    .fade-enter-active,
    .fade-leave-active {
        transition: opacity .5s ease;
    }

    .fade-enter,
    .fade-leave-active {
        opacity: 0;
    }
</style>

<body>
    <div id="app">
        <p style="with:40px" ref=myh3> {{msg}}</p>
        <!-- 通过传入 `to` 属性指定链接. -->
        <!-- <router-link> 默认会被渲染成一个 `<a>` 标签 -->
        <router-link to="/login" tag="span">Go to login</router-link>
        <router-link to="/login?id=10">loginParmas</router-link>
        <!-- <router-link to="/login/:id">loginParmas2</router-link> -->
        <router-link to="/register">Go to register</router-link>
        <router-link to="/forget_password">Go to forget_password</router-link>
        <router-link to="/user/12">user</router-link>
        <router-link to="/a-x">pass-through</router-link>
        <!-- 这是vue-router提供的元素，专门用来当做占位符的 -->
        <transition name="fade" mode="out-in">
            <router-view></router-view>
        </transition>

    </div>
    <!-- 路由出口 -->
    <!-- 路由匹配到的组件将渲染在这里 -->
    <template id="login">
        <transition name="slide">
            <div style="color: blue">
                <h1>{{this.$route.query.id}}这是在外面定义的组件</h1>
                <h1>这种定义方式有智能提示</h1>
            </div>
        </transition>
    </template>

    <template id="register">
        <div style="width:100px;height:100px">register</div>
    </template>
    <template id="forget_password">
        <div style="width:100px;height:100px;background-color:green">forget_password</div>
    </template>
    <template id="user">
        <div>我是用户{{ $route.params.id }}</div>
    </template>
    <template id="teacher">
        <div>我是teacher</div>
    </template>

    <script type="text/javascript">

        const Login = {
            template: '#login',
            created() {
                console.log(this.$route);
                console.log(this.$route.query.id);
            }
        }
        const Register = { template: '#register' }
        const ForgetPassword = { template: '#forget_password' }
        const User = {
            template: '#user',
            created() {
                console.log(this.$route.params.id);
            }
        }
        const Teacher = { template: '#teacher' }

        // 2. 定义路由
        // 每个路由应该映射一个组件。 其中"component" 可以是
        // 通过 Vue.extend() 创建的组件构造器，
        // 或者，只是一个组件配置对象。
        // 我们晚点再讨论嵌套路由。
        const routes = [
            { path: '/login', component: Login },
            { path: '/register', component: Register },
            {
                path: '/forget_password', redirect: to => {//重定向到登录
                    return 'login'
                }
            },
            //动态路由匹配
            { path: '/user/:id', component: User }//file:///Users/fuqingwang/PythonProject/monotonewang.github.io/vue_mirror/19_router.html#/user/2
            , {
                // 会匹配以 `/a-` 开头的任意路径
                path: '/a-*', component: Teacher
            }
        ]
        // 3. 创建 router 实例，然后传 `routes` 配置
        // 你还可以传别的配置参数, 不过先这么简单着吧。
        const routerObj = new VueRouter({
            routes, // （缩写）相当于 routes: routes

            // routes: [
            //     // dynamic segments start with a colon
            //     { path: '/user/:id', component: Login }
            // ]
            linkActiveClass: 'myclass',

        })

        // 4. 创建和挂载根实例。
        // 记得要通过 router 配置参数注入路由，
        // 从而让整个应用都有路由功能
        const app = new Vue({
            el: '#app',
            router: routerObj,//注册到vm实例上
            data: {
                msg: "这是一条新闻 走起来",
            },
            watch:{
                '$route.path':function(newVal,OldVal){//可以监听到地址的改变
                    console.log("----newVal"+newVal+"OldVal="+OldVal);
                }
            },
            computed:{//计算属性，只不过把他们的名称当做属性来使用

            }
        })
        // const app = new Vue({
        //     router: routerObj,//注册到vm实例上
        //     data: {
        //         msg: "这是一条新闻 走起来",
        //     },
        // }).$mount('#app')

        // var app = new Vue({
        //     el: '#app',
        //     data: {
        //         msg: "这是一条新闻 走起来",
        //     },
        //     methods: {

        //     }
        // })

    </script>
</body>

</html>

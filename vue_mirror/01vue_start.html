<html>

<head>
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script> -->
    <!-- 这是开发环境 -->
    <!-- 这是生产环境 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue"></script> -->

</head>

<style>
    /* 解决差值表达式闪烁 */
    [v-cloak] {
        display: none;
    }
</style>

<body>
    <button id="btn4click" v-on:click="changeMessage">app4PushMessage</button>
    <div id="app" v-cloak>
        <p>{{message}}</p>
        <h4 v-text="message">=========</h4>
        <!-- 能够解析html -->
        <h1 v-html="html"></h1>

    </div>

    <div id="app-2">
        <span v-bind:title="message">
            鼠标悬停几秒钟查看此处动态绑定的提示信息！
        </span>
    </div>
    <div id="app-3">
        <p v-if="seen">{{message}}</p>
        <button v-on:click="reverseMessage">逆转message</button>
        <!-- v-model 指令，它能轻松实现表单输入和应用状态之间的双向绑定。 -->
        <input v-model="message">
    </div>
    <div id="app-4">
        <ol>
            <li v-for="todo in todos">
                {{ todo.text }}
            </li>
        </ol>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>

    <!-- <script src="index.js"></script> -->
    <script type="text/javascript">
        var app = new Vue({
            el: '#app',
            data: {
                message: 'Hello Vue!',
                html:"<h1>当年范</h1>"
            }
        })
        var app2 = new Vue({
            el: '#app-2',
            data: {
                message: '页面加载于 ' + new Date().toLocaleString()
            }
        })
        var app3 = new Vue({
            el: '#app-3',
            data: {
                seen: true,
                message: "现在你看到我了"
            },
            methods: {
                reverseMessage: function (event) {
                    this.message = this.message.split('').reverse().join('')
                    // this.message="yes"
                }
            }
        })
        var app4 = new Vue({
            el: '#app-4',
            data: {
                todos: [
                    { text: '学习 JavaScript' },
                    { text: '学习 Vue' },
                    { text: '整个牛项目' }
                ]
            },

        })

        var btn4click = new Vue({
            el: '#btn4click',
            methods: {
                changeMessage: function (event) {
                    alert('Hello !')
                    app4.message = "New Message";
                }
            }
        })
        // 也可以用 JavaScript 直接调用方法
        // example2.greet() // => 'Hello Vue.js!

    </script>
</body>

</html>

<html>

<head>
    <!-- 这是开发环境 -->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <!-- 这是生产环境 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue"></script> -->

</head>

<body>
    <div id="app">
        <input v-model="parentMsg">
        <runoob message="hello vue"></runoob>
        <child_temp v-bind:parentmsg="parentMsg"></child_temp>
        <!-- 也可以用 v-bind 动态绑定 props 的值到父组件的数据中。每当父组件的数据变化时，该变化也会传导给子组件 -->
        <runoob v-bind:message="parentMsg"></runoob>
        <ol>
            <todo-item v-for="item in sites" v-bind:todo="item"></todo-item>
        </ol>

    </div>
    <div id="counter_child_event_example">
        <p>总数：{{total}}</p>
        <button-count v-on:add="add_father"></button-count>
        <button-count v-on:add="add_father"></button-count>
        <com1> </com1>
        <temp> </temp>

    </div>

    <template id="tmp1">
        <div>
            <h1>这是在外面定义的组件</h1>
            <h1>这种定义方式有智能提示</h1>
        </div>

    </template>

    <script type="text/javascript">
        // 使用vue.extends创建
        var com1 = Vue.extend({
            template: '<h3>这是vue.extend创建的组件{{message}}</h3>',
            // 组件可以有自己的数据和实例 data 必须是一个函数
            data:function(){
                return {
                    message:0//这是组件的私有数据
                }
            }
        })
        Vue.component('com1', com1);
        //这是全局注册组件
        // prop 是父组件用来传递数据的一个自定义属性。
        //定义组件有两种命名方式 一中是my-component-name  短横线命名法
        // 还有一中是驼峰命名法
        Vue.component('runoob', {
            props: ['message'],
            template: '<h1>自定义组件！{{message}}</h1>'
        })
        Vue.component('todo-item', {
            props: ['todo'],
            template: '<li>{{ todo.text }}</li>'
        })
        Vue.component('button-count', {
            template: '<button v-on:click="addHandler">自定义组件！{{counter}}</button>',
            data: function () {
                return { counter: 0 }
            },
            methods: {//父组件把方法传递给子组件
                addHandler: function () {
                    this.counter += 1
                    //可以传递参数
                    this.$emit("add",123)
                }
            }
        })

        Vue.component('temp', {
            template: '#tmp1'
        })
        // 局部注册组件
        // 可以通过属性绑定的形式，把 v-bind 方式传递数据
        var child = {
            props: ['parentmsg'],//这个数据是只读的，不能写
            template: '<h1>child_temp自定义组件！{{parentmsg}}</h1>'
        }
        var app = new Vue({
            el: '#app',
            data: {
                parentMsg: '父组件内容',
                sites: [
                    { text: 'Runoob' },
                    { text: 'Google' },
                    { text: 'Taobao' }
                ]
            },
            components: {
                
                child_temp: child
            }
        })
        new Vue({
            el: '#counter_child_event_example',
            data: {
                total: 0
            },
            methods: {
                add_father: function (value) {
                    console.log(value);
                    this.total += 1;//这里相当于修改了父组件里面的data 值
                }
            }
        })

    </script>
</body>

</html>

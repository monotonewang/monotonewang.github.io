<html>

<head>
    <!-- 这是开发环境 -->
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <!-- 这是生产环境 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue"></script> -->
    <!-- 最新版本的 Bootstrap 核心 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"
        integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="http://cdn.bootcss.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>

</head>
<style>

</style>

<body>
    <div id="app">

        <!-- bt3-primary -->
        <div class="panel panel-primary">
            <div class="panel-heading">
                <h3 class="panel-title">添加品牌</h3>
            </div>
            <div class="panel-body form-inline">
                <label>id:</label>
                <input type="text" v-model="brand_id" class="form-control">
                <label>品牌名称:</label>
                <input type="text" v-model="brand_name" class="form-control">
                <input type="button" v-on:click="add" class="btn btn-primary" value="增加"></input>
                <label>搜索:</label>
                <input type="text" v-on:click="search" class="form-control"  v-model="keywords"></input>

            </div>
        </div>

        <table class="table table-bordered table-hover table-striped">
            <thead>
                <tr>
                    <th>id</th>
                    <th>Name</th>
                    <th>CTime</th>
                    <th>Option</th>
                </tr>
            </thead>
            <tbody>
                <tr v-for="brand_bean in search(keywords)">
                    <td> {{brand_bean.id}}</td>
                    <td> {{brand_bean.name}}</td>
                    <td> {{brand_bean.ctime | dateFormat(brand_bean.ctime)}}</td>
                    <td> <a @click.prevent="del(brand_bean.id)">删除</a></td>
                </tr>
            </tbody>
        </table>




    </div>
    <!-- <script src="index.js"></script> -->
    <script type="text/javascript">

        var app = new Vue({
            el: '#app',
            data: {
                brand_id: "",
                brand_name: "",
                search_name: "",
                keywords:"",
                brand_list: [
                    { id: "2", name: "奔驰", ctime: new Date() },
                    { id: "3", name: "宝马", ctime: new Date() },

                ],
                intervalId: null,
            },
            filters:{
                dateFormat:function(value){
                    var date=new Date(value);
                    var y=date.getFullYear();
                    var m=date.getMonth()+1;
                    var d=date.getDate();
                    // return y+"-"+m+"-"+d;
                    // 模板字符串
                    return `${y}-${m}-${d}:${date.getHours()}-${date.getMinutes()}-${date.getSeconds()}`;
                }
            },
        
            methods: {
                add: function () {
                    // if(this.brand_id=""||this.brand_name="")
                    var temp = { id: this.brand_id, name: this.brand_name, ctime: new Date() };
                    this.brand_list.push(temp);
                    this.brand_id = this.brand_name = "";
                },
                search: function (keywords) {
                        var newList=[]
                        // this.brand_list.forEach(element => {
                        //     if(element.name.indexOf(keywords)!=-1){
                        //         newList.push(element)
                        //     }
                        // });
                        // return newList;
                        var test_list = this.brand_list.filter(item=>{
                            //es6 funcation
                            if(item.name.includes(keywords)){
                                return item;
                            }
                        })
                        return test_list;

                }, del: function (id) {
                    //第一种方法
                    // this.brand_list.some((item,index)=>{
                    //     if(item.id==id){
                    //         console.log (index);
                    //     }
                    // })
                    var index = this.brand_list.findIndex(item => {
                        if (item.id = id) {
                            this.brand_list.splice(index, 1) //在下标1处开始删除,删除一位
                            return true;
                        }
                    });
                }

            }
        })

    </script>
</body>

</html>

<html>

<head>
    <!-- <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script> -->
    <!-- <script src="https://unpkg.com/vue-router/dist/vue-router.js"></script> -->
    <script src="https://unpkg.com/vue/dist/vue.js"></script>
    <script src="https://unpkg.com/vue-router/dist/vue-router.js"></script>
    <!-- 这是vue-resourse的使用 -->
    <script src="https://cdn.jsdelivr.net/npm/vue-resource@1.5.1"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- 最新版本的 Bootstrap 核心 CSS 文件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css"
        integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
    <script src="http://cdn.bootcss.com/bootstrap/3.3.0/js/bootstrap.min.js"></script>
    <title>评论组件化应用</title>
</head>

<body>
    <div id="app">
        <cmt-box v-on:f_post_comment="loadComment"></cmt-box>
        <!-- bs3-list-group -->
        <ul class="list-group">
            <li class="list-group-item" v-for="item in list" :key="item.id">
                <span class="badge">评论人：{{item.user}}</span>
                {{item.content}}
            </li>

        </ul>

    </div>


    <template id="tmp1">
        <!-- 子组件唯一 -->
        <div >
            <div class="form-group">
                <label>评论人：</label>
                <input type="text" class="form-group" v-model="user"> </input>
                <br />
            </div>
            <div class="form-group">
                <label>评论内容：</label>
                <textarea  class="form-group" v-model="content"> </textarea>
            </div>
            <div class="form-group">
                <input type="button" class="form-group" value="发表评论" v-on:click="postCommment" > </input>
            </div>
        </div>
    </template>

    <script type="text/javascript">

        var commentBox = {
            data() {
                return {
                    user: "",
                    content: ""
                }
            },
            methods: {
                postCommment: function () {
                    //数据发到localStorage
                    //先阻止最新的评论数据对象
                    //保存到localStorage 只支持存放string数据
                    //先获取到之前的数据，JSON.parse[] 然后push到list里面
                    // JSON.stringify() 转化成数组字符串

                    var comment={id:Date.now(),user:this.user,content:this.content}
                    var list=JSON.parse(localStorage.getItem('cmts')||'[]')
                    list.push(comment);
                    localStorage.setItem('cmts',JSON.stringify(list));
                    this.user=this.content="";
                
                    this.$emit("f_post_comment");
                }
            },
            template: "#tmp1"
        }

        new Vue({
            el: '#app',
            data: {
                list: [

                    { id: Date.now(), user: '李白', content: '天生我才必有用' },
                    { id: Date.now(), user: '杜甫', content: '安得广厦千万间' }

                ]
            },
            methods: {
                loadComment(){
                    this.list=JSON.parse(localStorage.getItem('cmts')||'[]')
                }
            },
            created(){
                //生命周期调用方法需要用到this.
                this.loadComment();
            },
            components: {
                'cmt-box': commentBox
            }


        })

    </script>
</body>

</html>
